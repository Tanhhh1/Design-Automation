<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css" type="text/css">
    <style>
        .adsk-viewing-viewer .treeview lmvheader {
            display: flex;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>APS Manager</h2>
            </div>
            <hr>
            <div class="control-group">
                <label for="bucketFiles">Danh sách file:</label>
                <select id="bucketFiles">
                    <option value="">-- Chọn file để xem --</option>
                </select>
            </div>
            <div class="button-group">
                <input type="file" id="fileInput" hidden>
                <button id="btnUpload" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    Upload File
                </button>
                <button id="btnDownload" class="btn btn-secondary">Download</button>
            </div>
            <div class="button-group">
                <button id="btnExportExcel" class="btn btn-secondary">Export Excel</button>
                <button id="btnExportSelection" class="btn btn-primary">Export Selection</button>
            </div>
            <hr>
        </aside>
        <main class="viewer-container">
            <div id="forgeViewer"></div>
            <div id="loader" class="loader-overlay hidden">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
